# Served inside the frontend container. Proxies /api/* to the "backend" service on the docker
# network (see docker-compose.yml) and serves the built React app for everything else.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Client-side (React Router) — serve index.html for any non-file, non-/api route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
