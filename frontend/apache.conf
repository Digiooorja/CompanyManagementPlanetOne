# Served inside the frontend container (Apache httpd) — see frontend/Dockerfile, which enables
# mod_proxy/mod_proxy_http/mod_rewrite and includes this file. Proxies /api/* to the "backend"
# service on the docker network (see docker-compose.yml) and serves the built React app (with a
# client-side-routing fallback) for everything else.

ProxyPreserveHost On

# Proxy API requests to the backend container
ProxyPass /api http://backend:5000/api
ProxyPassReverse /api http://backend:5000/api

<Directory "/usr/local/apache2/htdocs">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    RewriteEngine On
    # Client-side (React Router) — serve index.html for any non-file, non-directory request
    # that isn't already being handled by the /api proxy above.
    RewriteCond %{REQUEST_URI} !^/api
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ /index.html [L]
</Directory>
