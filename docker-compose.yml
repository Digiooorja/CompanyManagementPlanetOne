version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: planetone-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Yash1234
      MYSQL_DATABASE: PlanetOneDashboard
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
