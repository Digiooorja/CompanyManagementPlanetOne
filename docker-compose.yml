services:
  db:
    image: mariadb:10.11
    container_name: planetone-mysql
    restart: always
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required for local db service}
      MYSQL_DATABASE: ${DB_NAME:-PlanetOneDashboard}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: planetone-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      # Use DB_HOST=db for dockerized local DB. For AWS/RDS, set DATABASE_URL in .env
      # and it will take precedence over these DB_* variables.
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-PlanetOneDashboard}
      DB_DIALECT: ${DB_DIALECT:-mysql}
      PORT: ${PORT:-5000}
    ports:
      - "127.0.0.1:5010:5000"
    volumes:
      - backend_backups:/app/backups

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: planetone-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8095:80"

volumes:
  mysql_data:
  backend_backups:
